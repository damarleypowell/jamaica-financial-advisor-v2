    <path d="M26 2L6 10V28C6 40 16 50 26 54C36 50 46 40 46 28V10L26 2Z" fill="url(#shieldGrad)" stroke="url(#strokeGrad)" stroke-width="1.5"/>
    <!-- Building/Tower lines inside shield -->
    <rect x="22" y="14" width="8" height="28" rx="1" fill="#0a0f1a" opacity="0.9"/>
    <rect x="14" y="22" width="8" height="20" rx="1" fill="#0a0f1a" opacity="0.7"/>
    <rect x="30" y="18" width="8" height="24" rx="1" fill="#0a0f1a" opacity="0.8"/>
    <!-- Chart line overlay -->
    <polyline points="10,38 18,32 26,28 34,20 42,16" stroke="#00c853" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="42" cy="16" r="2.5" fill="#00c853"/>
  </g>
  <!-- Text -->
  <text x="62" y="28" font-family="'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif" font-size="22" font-weight="800" fill="white" letter-spacing="-0.5">GOTHAM</text>
  <text x="62" y="48" font-family="'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="500" fill="#6b7280" letter-spacing="3">FINANCIAL</text>
  <!-- Gradients -->
