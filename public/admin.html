<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gotham Financial — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060810; --bg2: #0c1017; --bg3: #111822;
      --card: rgba(255,255,255,0.03); --glass: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.1);
      --text: #e8edf2; --text2: #c0c8d4; --muted: #6b7a8d;
      --green: #00c853; --red: #ff1744; --blue: #00b0ff; --gold: #ffd600; --purple: #bb86fc;
      --radius: 14px; --radius-sm: 8px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px; background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .admin-header h1 { font-size: 20px; font-weight: 700; }
    .admin-header h1 span { color: var(--gold); }
    .admin-header .back-link { color: var(--blue); text-decoration: none; font-size: 14px; }
    .admin-header .back-link:hover { text-decoration: underline; }

    .admin-container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

    .metrics-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px;
    }
    .metric-card {
      background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; text-align: center;
    }
    .metric-card .value { font-size: 36px; font-weight: 800; margin-bottom: 4px; }
    .metric-card .label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .metric-card.green .value { color: var(--green); }
    .metric-card.blue .value { color: var(--blue); }
    .metric-card.gold .value { color: var(--gold); }
    .metric-card.purple .value { color: var(--purple); }

    .section { margin-bottom: 32px; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .section-title i { color: var(--blue); }

    table { width: 100%; border-collapse: collapse; background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    th { text-align: left; padding: 12px 16px; background: var(--bg3); color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    td { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 14px; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase;
    }
    .badge.green { background: rgba(0,200,83,0.15); color: var(--green); }
    .badge.red { background: rgba(255,23,68,0.15); color: var(--red); }
    .badge.blue { background: rgba(0,176,255,0.15); color: var(--blue); }
    .badge.gold { background: rgba(255,214,0,0.15); color: var(--gold); }
    .badge.muted { background: rgba(255,255,255,0.08); color: var(--muted); }

    .btn {
      padding: 8px 16px; border: none; border-radius: var(--radius-sm); cursor: pointer;
      font-size: 13px; font-weight: 600; transition: all 0.2s;
    }
    .btn-sm { padding: 4px 12px; font-size: 12px; }
    .btn-green { background: rgba(0,200,83,0.15); color: var(--green); }
    .btn-green:hover { background: rgba(0,200,83,0.25); }
    .btn-red { background: rgba(255,23,68,0.15); color: var(--red); }
    .btn-red:hover { background: rgba(255,23,68,0.25); }

    .search-box {
      background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 16px; color: var(--text); font-size: 14px; width: 300px; outline: none;
    }
    .search-box:focus { border-color: var(--blue); }
    .search-box::placeholder { color: var(--muted); }

    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab {
      padding: 8px 20px; background: var(--glass); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--muted); cursor: pointer;
      font-size: 13px; font-weight: 500; transition: all 0.2s;
    }
    .tab.active { background: var(--blue); color: white; border-color: var(--blue); }
    .tab:hover:not(.active) { border-color: var(--border2); color: var(--text); }

    .loading { text-align: center; padding: 60px; color: var(--muted); }
    .loading i { font-size: 32px; margin-bottom: 12px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { background: rgba(255,23,68,0.1); border: 1px solid var(--red); border-radius: var(--radius-sm); padding: 16px; color: var(--red); text-align: center; }

    .kyc-card {
      background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
    }
    .kyc-card .info h3 { font-size: 15px; margin-bottom: 4px; }
    .kyc-card .info p { font-size: 13px; color: var(--muted); }
    .kyc-card .actions { display: flex; gap: 8px; }

    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
    .pagination button { background: var(--glass); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; }
    .pagination button.active { background: var(--blue); border-color: var(--blue); }
    .pagination button:disabled { opacity: 0.3; cursor: default; }
  </style>
</head>
<body>
  <div class="admin-header">
    <h1><i class="fas fa-shield-halved"></i> <span>Gotham</span> Admin</h1>
    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Platform</a>
  </div>

  <div class="admin-container">
    <div id="auth-gate" style="display:none;">
      <div class="error-msg">
        <i class="fas fa-lock"></i> Admin access required. Please log in with an admin account.
        <br><br><a href="/" style="color:var(--blue)">Go to login</a>
      </div>
    </div>

    <div id="admin-content" style="display:none;">
      <!-- Metrics -->
      <div class="metrics-grid" id="metrics-grid"></div>

      <!-- Tabs -->
      <div class="tabs">
        <div class="tab active" data-tab="users"><i class="fas fa-users"></i> Users</div>
        <div class="tab" data-tab="orders"><i class="fas fa-exchange-alt"></i> Orders</div>
        <div class="tab" data-tab="kyc"><i class="fas fa-id-card"></i> KYC Review</div>
        <div class="tab" data-tab="subscriptions"><i class="fas fa-crown"></i> Subscriptions</div>
      </div>

      <!-- Users Tab -->
      <div id="tab-users" class="section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h2 class="section-title" style="margin:0;"><i class="fas fa-users"></i> Users</h2>
          <input type="text" class="search-box" id="user-search" placeholder="Search users..." oninput="debounceSearch()">
        </div>
        <div id="users-table"></div>
      </div>

      <!-- Orders Tab -->
      <div id="tab-orders" class="section" style="display:none;">
        <h2 class="section-title"><i class="fas fa-exchange-alt"></i> Recent Orders</h2>
        <div id="orders-table"></div>
      </div>

      <!-- KYC Tab -->
      <div id="tab-kyc" class="section" style="display:none;">
        <h2 class="section-title"><i class="fas fa-id-card"></i> Pending KYC Reviews</h2>
        <div id="kyc-list"></div>
      </div>

      <!-- Subscriptions Tab -->
      <div id="tab-subscriptions" class="section" style="display:none;">
        <h2 class="section-title"><i class="fas fa-crown"></i> Subscription Breakdown</h2>
        <div id="sub-breakdown"></div>
      </div>
    </div>

    <div id="loading" class="loading">
      <i class="fas fa-spinner"></i>
      <p>Loading admin dashboard...</p>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    let currentTab = 'users';
    let userPage = 1;
    let searchTimeout;

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) },
      });
      if (res.status === 403) throw new Error('FORBIDDEN');
      return res.json();
    }

    function timeAgo(d) {
      const s = Math.floor((Date.now() - new Date(d)) / 1000);
      if (s < 60) return 'just now';
      if (s < 3600) return Math.floor(s/60) + 'm ago';
      if (s < 86400) return Math.floor(s/3600) + 'h ago';
      return Math.floor(s/86400) + 'd ago';
    }

    function statusBadge(status) {
      const map = { FILLED: 'green', ACTIVE: 'green', VERIFIED: 'green', PENDING: 'gold', OPEN: 'blue', CANCELLED: 'red', REJECTED: 'red', NONE: 'muted' };
      return `<span class="badge ${map[status] || 'muted'}">${status}</span>`;
    }

    function planBadge(plan) {
      const map = { BASIC: 'blue', PRO: 'gold', ENTERPRISE: 'purple' };
      return `<span class="badge ${map[plan] || 'muted'}">${plan}</span>`;
    }

    // ── Load Dashboard ──────────────────────────────────────────────────────
    async function loadDashboard() {
      try {
        const data = await api('/api/admin/dashboard');
        if (data.error) throw new Error(data.error);

        const m = data.metrics;
        document.getElementById('metrics-grid').innerHTML = `
          <div class="metric-card blue"><div class="value">${m.totalUsers}</div><div class="label">Total Users</div></div>
          <div class="metric-card green"><div class="value">${m.newUsersToday}</div><div class="label">New Today</div></div>
          <div class="metric-card gold"><div class="value">${m.totalOrders}</div><div class="label">Total Orders</div></div>
          <div class="metric-card purple"><div class="value">${m.ordersToday}</div><div class="label">Orders Today</div></div>
          <div class="metric-card green"><div class="value">${m.activeSubscriptions}</div><div class="label">Active Subs</div></div>
          <div class="metric-card blue"><div class="value">${m.newUsersMonth}</div><div class="label">Users This Month</div></div>
          <div class="metric-card gold"><div class="value">${m.ordersMonth}</div><div class="label">Orders This Month</div></div>
          <div class="metric-card purple"><div class="value">${m.totalAlerts}</div><div class="label">Active Alerts</div></div>
        `;

        // Render subscription breakdown
        if (data.subscriptionBreakdown) {
          document.getElementById('sub-breakdown').innerHTML = `
            <div class="metrics-grid" style="max-width:600px;">
              ${data.subscriptionBreakdown.map(s => `
                <div class="metric-card">
                  <div class="value">${s.count}</div>
                  <div class="label">${planBadge(s.plan)}</div>
                </div>
              `).join('')}
            </div>
          `;
        }

        // Render recent orders
        if (data.recentOrders) renderOrders(data.recentOrders);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';

        // Load users
        loadUsers();
        loadKYC();
      } catch (e) {
        document.getElementById('loading').style.display = 'none';
        if (e.message === 'FORBIDDEN') {
          document.getElementById('auth-gate').style.display = 'block';
        } else {
          document.getElementById('admin-content').innerHTML = `<div class="error-msg">${e.message}</div>`;
          document.getElementById('admin-content').style.display = 'block';
        }
      }
    }

    // ── Users ────────────────────────────────────────────────────────────────
    async function loadUsers(page = 1, search = '') {
      userPage = page;
      try {
        const data = await api(`/api/admin/users?page=${page}&limit=15&search=${encodeURIComponent(search)}`);
        let html = `<table>
          <tr><th>Name</th><th>Email</th><th>Joined</th><th>KYC</th><th>Status</th><th>Orders</th><th>Actions</th></tr>
          ${data.users.map(u => `
            <tr>
              <td>${u.name}</td>
              <td style="color:var(--muted)">${u.email}</td>
              <td>${timeAgo(u.createdAt)}</td>
              <td>${statusBadge(u.kycStatus)}</td>
              <td>${u.isActive ? '<span class="badge green">Active</span>' : '<span class="badge red">Disabled</span>'}</td>
              <td>${u._count?.orders || 0}</td>
              <td>
                <button class="btn btn-sm ${u.isActive ? 'btn-red' : 'btn-green'}" onclick="toggleUser('${u.id}', ${!u.isActive})">
                  ${u.isActive ? 'Disable' : 'Enable'}
                </button>
              </td>
            </tr>
          `).join('')}
        </table>`;

        // Pagination
        if (data.pages > 1) {
          html += `<div class="pagination">
            <button ${page <= 1 ? 'disabled' : ''} onclick="loadUsers(${page-1}, '${search}')">Prev</button>
            <span style="padding:6px 14px;color:var(--muted)">Page ${page} of ${data.pages}</span>
            <button ${page >= data.pages ? 'disabled' : ''} onclick="loadUsers(${page+1}, '${search}')">Next</button>
          </div>`;
        }

        document.getElementById('users-table').innerHTML = html;
      } catch (e) {
        document.getElementById('users-table').innerHTML = `<div class="error-msg">${e.message}</div>`;
      }
    }

    async function toggleUser(id, activate) {
      if (!confirm(`${activate ? 'Enable' : 'Disable'} this user?`)) return;
      await api(`/api/admin/users/${id}`, { method: 'PUT', body: JSON.stringify({ isActive: activate }) });
      loadUsers(userPage, document.getElementById('user-search').value);
    }

    function debounceSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => loadUsers(1, document.getElementById('user-search').value), 300);
    }

    // ── Orders ──────────────────────────────────────────────────────────────
    function renderOrders(orders) {
      document.getElementById('orders-table').innerHTML = `<table>
        <tr><th>Symbol</th><th>Side</th><th>Type</th><th>Qty</th><th>Price</th><th>Status</th><th>When</th></tr>
        ${orders.map(o => `
          <tr>
            <td style="font-weight:600">${o.symbol}</td>
            <td><span class="badge ${o.side === 'BUY' ? 'green' : 'red'}">${o.side}</span></td>
            <td>${o.orderType || o.type || 'MARKET'}</td>
            <td>${parseFloat(o.quantity).toFixed(0)}</td>
            <td>${o.limitPrice ? '$' + parseFloat(o.limitPrice).toFixed(2) : 'Market'}</td>
            <td>${statusBadge(o.status)}</td>
            <td style="color:var(--muted)">${timeAgo(o.createdAt)}</td>
          </tr>
        `).join('')}
      </table>`;
    }

    // ── KYC ─────────────────────────────────────────────────────────────────
    async function loadKYC() {
      try {
        const data = await api('/api/admin/kyc/pending');
        if (!data.users || data.users.length === 0) {
          document.getElementById('kyc-list').innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px;">No pending KYC reviews</p>';
          return;
        }
        document.getElementById('kyc-list').innerHTML = data.users.map(u => `
          <div class="kyc-card">
            <div class="info">
              <h3>${u.fullLegalName || u.name}</h3>
              <p>${u.email} &bull; Submitted ${u.submittedAt ? timeAgo(u.submittedAt) : 'recently'}</p>
              <p>${(u.documents || []).map(d => `<span class="badge blue">${d.type}</span>`).join(' ')}</p>
            </div>
            <div class="actions">
              <button class="btn btn-green" onclick="reviewKYC('${u.id}', true)"><i class="fas fa-check"></i> Approve</button>
              <button class="btn btn-red" onclick="reviewKYC('${u.id}', false)"><i class="fas fa-times"></i> Reject</button>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('kyc-list').innerHTML = `<div class="error-msg">${e.message}</div>`;
      }
    }

    async function reviewKYC(userId, approved) {
      const reason = approved ? null : prompt('Rejection reason:');
      if (!approved && !reason) return;
      await api('/api/admin/kyc/review', { method: 'POST', body: JSON.stringify({ userId, approved, reason }) });
      loadKYC();
      loadDashboard();
    }

    // ── Tabs ────────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const target = tab.dataset.tab;
        ['users', 'orders', 'kyc', 'subscriptions'].forEach(t => {
          document.getElementById('tab-' + t).style.display = t === target ? 'block' : 'none';
        });
      });
    });

    // ── Init ────────────────────────────────────────────────────────────────
    if (!token) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('auth-gate').style.display = 'block';
    } else {
      loadDashboard();
    }
  </script>
</body>
</html>
